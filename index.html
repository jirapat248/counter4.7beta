<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kratom Counter Dashboard (Global Cloud)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #4CAF50; font-size: 24px; margin-bottom: 5px; }
        h2 { color: #888; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 15px; border: 1px solid #2d2d2d; }
        .global-round { font-size: 40px; font-weight: bold; color: #ff9800; margin: 10px 0; }
        .status-badge { display: inline-block; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 5px; }
        .active-bg { background-color: #4CAF50; color: white; }
        .inactive-bg { background-color: #f44336; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1e1e1e; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2d2d2d; color: #4CAF50; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .txt-center { text-align: center; }
        .txt-right { text-align: right; }
        .active-row { background-color: rgba(76, 175, 80, 0.05); }
        .round-num { font-size: 16px; font-weight: bold; color: #888888; }
        .round-highlight { font-size: 17px; font-weight: bold; color: #00ff66; text-shadow: 0 0 5px rgba(0, 255, 102, 0.3); }
        .time-elapsed { font-size: 13px; color: #ff5555; font-weight: bold; margin-top: 5px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // กำหนดที่อยู่ Realtime Database ของคุณ
        const firebaseConfig = {
            databaseURL: "https://counter-v4-7beta-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        // บูตแอปพลิเคชัน Firebase ฝั่งเว็บ
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // โครงสร้างตัวแปรของอาเรย์ชื่อภาษาไทยเพื่อใช้แทนค่าในการแสดงผล
        const playerThaiNames = [
          "แทน", "โอ๊ตวายริ่ง", "เสี่ยมาร์ค", "ภู",
          "แม็ค", "พลอย", "เพชร", "ไปรท์",
          "โอ๊คติ๋ม", "ชานนท์", "ไอซ์", "บิว", "บอสหลอน", "ผู้ใช้ 1"
        ];

        // เรียกดูข้อมูลและคอยดักจับความเปลี่ยนแปลงบนคลาวด์แบบ Realtime (.on)
        function listenToFirebase() {
            database.ref('/kratom_counter').on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                document.getElementById('g_round').innerText = data.globalRound;
                document.getElementById('active_count').innerText = data.activeCount;
                document.getElementById('time_press').innerText = data.timeSinceLastPress;
                
                let tableBody = '';
                if(data.players) {
                    data.players.forEach((p, index) => {
                        let statusBadge = p.active ? '<span class="status-badge active-bg">ON</span>' : '<span class="status-badge inactive-bg">OFF</span>';
                        let rowClass = p.active ? 'class="active-row"' : '';
                        let roundClass = (p.round > 0) ? 'round-highlight' : 'round-num';
                        
                        let displayName = playerThaiNames[index] || p.name;

                        tableBody += `<tr ${rowClass}>
                            <td>${displayName}</td>
                            <td class="txt-center">${statusBadge}</td>
                            <td class="txt-right ${roundClass}">${p.round}</td>
                        </tr>`;
                    });
                }
                document.getElementById('player_table').innerHTML = tableBody;
            }, (error) => {
                console.error("Firebase Connection Error: ", error);
            });
        }

        window.onload = listenToFirebase;
    </script>
</head>
<body>
    <div class="container">
        <h1>🌿 Kratom Counter (Cloud Live) 🌿</h1>
        <h2>YENCHAM GANG OFFICIAL</h2>
        
        <div class="card">
            <div style="font-size: 14px; color: #aaa;">TOTAL ROUNDS</div>
            <div class="global-round" id="g_round">--</div>
            <div style="font-size: 13px; color: #888;">กำลังวนอยู่: <span id="active_count" style="color:#4CAF50; font-weight:bold;">-</span> คน</div>
            <div class="time-elapsed">⏱️ รอบล่าสุดผ่านมาแล้ว: <span id="time_press">0</span> วินาที</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>รายชื่อนักวนน้ำ</th>
                    <th class="txt-center">สถานะ</th>
                    <th class="txt-right">จำนวนที่เข้าสู่ร่างกาย</th>
                </tr>
            </thead>
            <tbody id="player_table"></tbody>
        </table>
    </div>
</body>
</html>
